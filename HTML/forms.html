<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captcha Form</title>
</head>
<body>
    <h2>Captcha Form</h2>
    <form>
        <label for="Username">Username: </label>
        <input type="text" id="Username" placeholder="Enter username..." name="Username">
        <br>
        <br>
        <label for="Password">Password: </label>
        <input type="password" id="Password" placeholder="Enter password..." name="Password" required>
        <br>
        <br>
        <label for="Email">Email: </label>
        <input type="email" placeholder="Enter email..." name="email">
        <br>
        <br>
        <label for="Mobile">Mobile: </label>
        <input type="tel" id="Mobile" placeholder="Enter mobile..." name="Mobile">
        <br>
        <br>
        <label for="Age">Age: </label>
        <input type="number" min="1" max="100" placeholder="Enter age..." name="Age">
        <br>
        <br>
        <label for="Date of Birth">Date of Birth: </label>
        <input type="date">
        <br>
        <br>
        <label for="Profile URL">Profile URL: </label>
        <input type="url">
        <br>
        <br>
        <label for="captcha">Enter Captcha: </label>
        <input type="text" id="captcha" placeholder="Enter Capcha..." name="captcha">
        <br>
        <br>
        <input type="submit"> &nbsp; &nbsp; &nbsp; &nbsp;
        <input type="reset" value="cancel">
        <br>
        <br>
        <button type="button">Help Center</button>
    </form>
</body>
</html>
