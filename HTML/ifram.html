<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe in HTML</title>
</head>
<body>
    <h1>My Webpage</h1>
    <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Voluptas aliquid, modi reiciendis non nulla architecto. Obcaecati illum, repellat deleniti itaque rerum modi animi sapiente maxime nulla porro quidem libero velit!</p>
    
    
    <!-- Iframe -->
    <iframe srcdoc='<h1>My Own Webpage</h1> <a href="https://www.kodnest.com" target="frame2">Visit Kodnest</a>' width="400px" height="400px" scrolling="yes"></iframe>

    <iframe src="" name="frame2" width="400px" height="400px" frameborder="1"></iframe>
</body>
</html>
