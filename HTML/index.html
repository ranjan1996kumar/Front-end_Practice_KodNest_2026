<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attributes</title>
</head>
<body>
    <!--Case 1-->
    <p contenteditable="false" style="color: red;">Hello Everyone! How are you?</p>
    <!--Case 2-->
    <p>Hello</p>
    <!--<br> tag display in new line-->
    <p>Hello<br>
                    H I !
    </p>
    <!--Preformatted text-->
    <pre>Hello
                    H I !
    </pre>
</body>
</html>
