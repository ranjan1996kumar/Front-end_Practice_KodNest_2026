<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
</head>
<body>
    <h2>User Form</h2>
    <hr>
    <br>
    <form>
        <!-- OM - Capital Letters Only
        Ranjan - Titlle Case -->
        <label for="un">Name: </label>
        <!-- "^[A-Z]{1}[a-z]{2,9}$" || ^[A-Za-z]{2,10}$-->
        <input type="text" id="un" name="username" placeholder="Enter name" pattern="^[A-Z]{1}[a-z]{2,9}$">
        <br>
        <br>
        <label for="phone">Phone:</label>
        <!-- four way to validate mobile no with country code "^[0-9]{10}$" || "^\d{3}-\d{3}-\d{4}$" || "^[6-9]{1}[0-9]{9}$" || "^\+91[6-9]{1}\d{2}-\d{3}-\d{4}$"-->
        <input type="text" id="phone" name="phone" placeholder="Enter phone number" pattern="^\d{3}-\d{3}-\d{4}$">
        <br>
        <br>
        <label for="email">Email: </label>
        <input type="text" id="email" name="email" placeholder="Enter email id" pattern="^[A-Za-z0-9\._%+\-]+@[A-Za-z0-9\.\-]+\.[A-Za-z]{2,}$">
        <br>
        <br>
        <label for="pwd">Password: </label>
        <input type="password" id="pwd" name="password" placeholder="Enter password" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$">
        <br>
        <br>
        <button type="submit">Submit</button>
        <button type="cancel">Cancel</button>
    </form>
</body>
</html>
