<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
</head>
<body>
    <h2>User Form</h2>
    <hr>
    <br>
    <form>
        <!-- OM - Capital Letters Only
        Ranjan - Titlle Case -->
        <label for="un">Name: </label>
        <input type="text" id="un" name="username" pattern="^[A-Za-z]{2,10}$">
        <br>
        <br>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
