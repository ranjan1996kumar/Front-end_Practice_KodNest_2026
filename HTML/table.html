<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tables</title>
</head>
<body>
    <table border="1">
        <caption>User Info Table</caption>
        <!-- 1st row -->
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>
        <!-- 2nd row -->
        <tr>
            <td>John</td>
            <td>25</td>
            <td>New York</td>
        </tr>
        <!-- 3rd row -->
        <tr>
            <td>Jane</td>
            <td>30</td>
            <td>Los Angeles</td>
    </table>
</body>
</html>
